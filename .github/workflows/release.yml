name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            task: packageMsi
          - os: ubuntu-latest
            task: packageDeb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build package
        run: ./gradlew :composeApp:${{ matrix.task }}
        shell: bash

      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p release-artifacts
          find composeApp/build/compose/binaries/main -type f \( -name "*.deb" \) -exec cp {} release-artifacts/ \;
        shell: bash

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts
          Get-ChildItem -Path "composeApp/build/compose/binaries/main" -Recurse -Include *.msi | Copy-Item -Destination release-artifacts
        shell: pwsh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-packages
          path: release-artifacts/*

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all built artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Show downloaded files
        run: find downloaded-artifacts -type f

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: downloaded-artifacts/**/*
